<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VEILCORP // BRB Overlay</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="../../favicon.ico?v=20260608-veilcorp1" sizes="any" />
  <link rel="stylesheet" href="overlay.css?v=20260609-brb2" />
</head>
<body>
  <main class="overlay-stage" aria-label="VeilCorp intermission overlay">
    <div class="wide-scan" aria-hidden="true"></div>
    <div class="sky-wash wash-one" aria-hidden="true"></div>
    <div class="sky-wash wash-two" aria-hidden="true"></div>
    <div class="tower-column" aria-hidden="true"></div>
    <div class="sigil-ring ring-primary" aria-hidden="true"></div>
    <div class="sigil-ring ring-secondary" aria-hidden="true"></div>
    <div class="right-panel-glow" aria-hidden="true"></div>
    <div class="node-card-glitch" aria-hidden="true"></div>
    <div class="barcode-sweep sweep-top" aria-hidden="true"></div>
    <div class="barcode-sweep sweep-side" aria-hidden="true"></div>
    <div class="barcode-sweep sweep-bottom" aria-hidden="true"></div>
    <span class="status-light node-status"></span>
    <span class="status-light archive-hold"></span>
    <span class="status-light signal-flow"></span>
    <div class="signal-monitor signal-top">
      <span style="--bar: 34%"></span>
      <span style="--bar: 48%"></span>
      <span style="--bar: 62%"></span>
      <span style="--bar: 84%"></span>
      <span style="--bar: 72%"></span>
    </div>
    <div class="signal-monitor signal-bottom">
      <span style="--bar: 40%"></span>
      <span style="--bar: 58%"></span>
      <span style="--bar: 76%"></span>
      <span style="--bar: 92%"></span>
    </div>
    <div class="hold-progress" aria-hidden="true"></div>
    <p class="panel-cycle" id="panel-cycle">INTERMISSION NODE ACTIVE</p>
  </main>
  <script src="overlay.js?v=20260609-brb2"></script>
</body>
</html>
