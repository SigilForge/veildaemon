<body>
  <main class="console-shell">
    <header>
      <p>VEILCORP ARCHIVES // REVIEW NODE</p>
      <h1>Needlepoint Debrief Queue</h1>
    </header>

    <section class="token-panel" aria-label="Console access">
      <label for="token">Access token</label>
      <div class="token-row">
        <input id="token" type="password" autocomplete="off" placeholder="Required" />
        <button type="button" id="save-token">Hold</button>

    <section class="queue-panel" aria-label="Report queue">
      <div class="queue-header">
        <h2>Manual Recovery Review</h2>
        <button type="button" id="refresh-queue">Refresh</button>
      </div>
      <div id="report-list" class="report-list"></div>
    </section>

    <p class="status-line" id="status-line" role="status">Queue awaiting authorization.</p>
  </main>
  <script src="/admin/reports/admin.js?v=20260619-aar1"></script>
