<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VEILCORP // Admin Panel</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="../favicon.ico?v=20260608-veilcorp1" sizes="any" />
  <link rel="stylesheet" href="/admin/style.css?v=20260628-wrap1" />
</head>
<body>
  <main class="admin-shell">
    <header class="admin-header">
      <div>
        <p>VEILCORP ARCHIVES // CONTROL NODE</p>
        <h1>Admin Panel</h1>
      </div>
      <a href="../">Return to Intake</a>
    </header>

    <section class="token-panel" aria-label="Console access">
      <label for="admin-token">Access token</label>
      <div class="token-row">
        <input id="admin-token" type="password" autocomplete="off" placeholder="Optional pass-through" />
        <button type="button" id="hold-token">Hold</button>
      </div>
    </section>

    <nav class="surface-switcher" aria-label="Admin surfaces">
      <button type="button" class="surface-button is-active" data-surface="/admin/reports/">Debrief Queue</button>
      <button type="button" class="surface-button" data-surface="/admin/reports/#anomaly-volunteers">Anomaly Volunteers</button>
      <button type="button" class="surface-button" data-surface="/admin/alerts/">Attention Events</button>
      <button type="button" class="surface-button" data-surface="/admin/conversion/">Conversion Board</button>
    </nav>

    <section class="surface-frame-wrap" aria-label="Selected admin surface">
      <iframe id="admin-surface" title="Selected admin surface" src="/admin/reports/"></iframe>
    </section>

    <p class="status-line" id="admin-status" role="status">Surface ready.</p>
  </main>
  <script src="/admin/admin.js?v=20260623-conversion1"></script>
</body>
</html>
