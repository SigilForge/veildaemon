name: Guard StreamDaemon Secrecy
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect StreamDaemon scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            mapfile -t changed < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          elif [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
          else
            mapfile -t changed < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          fi

          check_streamdaemon=0
          for file in "${changed[@]}"; do
            case "$file" in
              .github/workflows/guard_streamdaemon.yml|streamdaemon/*|streamdaemon/**|StreamDaemon/*|StreamDaemon/**)
                check_streamdaemon=1
                ;;
            esac
          done

          if [[ $check_streamdaemon -eq 1 ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No StreamDaemon-facing files changed; guard satisfied."
          fi
      - name: Fail if StreamDaemon content present beyond allowed stubs
        if: steps.scope.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Find any files under StreamDaemon or streamdaemon
          mapfile -t files < <(git ls-files | grep -Ei '^(streamdaemon|StreamDaemon)/')
          bad=0
          for f in "${files[@]}"; do
            case "$f" in
              streamdaemon/pyproject.toml|streamdaemon/plugins/|streamdaemon/plugins/__init__.py|streamdaemon/README.md|streamdaemon/.gitkeep|StreamDaemon/README.md|StreamDaemon/.gitkeep)
                ;;
              *)
                echo "Forbidden StreamDaemon file: $f"
                bad=1
                ;;
            esac
          done
          if [[ $bad -ne 0 ]]; then
            echo "StreamDaemon private content detected. Remove before merging."
            exit 1
          fi
