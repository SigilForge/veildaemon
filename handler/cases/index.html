<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VEILDAEMON // Handler Cases</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="../../favicon.ico?v=20260608-veilcorp1" sizes="any" />
  <link rel="stylesheet" href="../handler.css?v=20260626-fieldlock4" />
</head>
<body class="handler-surface module-surface" data-handler-module="cases">
  <div class="noise" aria-hidden="true"></div>
  <main class="handler-shell">
    <header class="handler-header">
      <div class="seal-wrap"><img src="../../assets/veilcorp-avatar.png" alt="VeilCorp sigil" class="seal" /></div>
      <div><p class="kicker">HANDLER CONSOLE // CASES / NEEDLEPOINTS</p><h1>CASE FILE</h1><p class="subhead">Needlepoint prep and next beats without turning the table into a manual.</p></div>
    </header>
    <section class="status-strip" aria-label="Case status">
      <div><span>Case</span><strong id="module-case">No case loaded</strong></div>
      <div><span>Attention</span><strong id="module-attention">Unseen</strong></div>
      <div><span>Clock</span><strong id="module-clock">0/6</strong></div>
      <div><span>Storage</span><strong id="storage-status">LOCAL READY</strong></div>
    </section>
    <form class="dashboard-form">
      <section class="panel case-panel"><div class="panel-heading"><p class="kicker">CASE HEADER</p><h2>Session / Case / Location</h2></div><div class="field-grid three"><label>Session<input name="session.title" maxlength="120" /></label><label>Case<input name="session.caseTitle" maxlength="120" /></label><label>Location<input name="session.location" maxlength="160" /></label></div><label>Public Scene Label<input name="session.safeSceneLabel" maxlength="160" /></label></section>
      <section class="panel helper-panel"><div class="panel-heading"><p class="kicker">NEXT LIVE BEATS</p><h2>What the Handler needs next</h2></div><div class="field-grid two"><label>Next Clue<textarea name="caseFile.nextClue" rows="4"></textarea></label><label>Next Pressure Beat<textarea name="caseFile.nextPressureBeat" rows="4"></textarea></label><label>Case Templates / Needlepoints<textarea name="caseFile.templates" rows="5"></textarea></label><label>Case Notes<textarea name="caseFile.notes" rows="5"></textarea></label></div></section>
    </form>
  </main>
  <script src="../../catalogs.js?v=20260625-live-catalog1"></script>
  <script src="../handler-state.js?v=20260626-fieldlock4"></script>
  <script src="../handler-nav.js?v=20260626-fieldlock4"></script>
  <script src="../handler-modules.js?v=20260626-importslot1"></script>
</body>
</html>
