<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VEILDAEMON // Handler NPCs</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="../../favicon.ico?v=20260608-veilcorp1" sizes="any" />
  <link rel="stylesheet" href="../handler.css?v=20260625-secondaryclock1" />
</head>
<body class="handler-surface module-surface" data-handler-module="npcs">
  <div class="noise" aria-hidden="true"></div>
  <main class="handler-shell">
    <header class="handler-header">
      <div class="seal-wrap"><img src="../../assets/veilcorp-avatar.png" alt="VeilCorp sigil" class="seal" /></div>
      <div><p class="kicker">HANDLER CONSOLE // NPCS</p><h1>NPC TRACKER</h1><p class="subhead">Keep 3-5 active people visible. Everyone else belongs in notes.</p></div>
      <nav class="header-actions"><a class="button primary" href="../">Overview</a><a class="button ghost" href="../live/">Live Dashboard</a></nav>
    </header>
    <section class="status-strip"><div><span>Terminology</span><strong>Handler</strong></div><div><span>Flags</span><strong>Ally / Witness / Threat / Missing / Compromised</strong></div><div><span>Limit</span><strong>3-5 Active NPCs</strong></div><div><span>Storage</span><strong id="storage-status">LOCAL READY</strong></div></section>
    <section class="control-bar"><button class="button primary" id="add-npc" type="button">Add NPC</button><button class="button" id="export-case" type="button">Export Handler Backup</button><label class="button file-button">Restore Handler Backup<input id="import-case" type="file" accept="application/json" /></label></section>
    <section class="panel"><div class="panel-heading"><p class="kicker">ACTIVE NPCS</p><h2>Role / pressure / location / flags</h2></div><div class="player-grid" id="npc-grid"></div></section>
  </main>
  <script src="../../catalogs.js?v=20260625-live-catalog1"></script><script src="../handler-state.js?v=20260625-live-catalog1"></script>
  <script src="../handler-modules.js?v=20260625-authsurface1"></script>
</body>
</html>
